# Starter kit criador-dash v2. Troque os placeholders pelos seus IDs no painel Cloudflare.
name = "meu-dashboard"
pages_build_output_dir = "public"
compatibility_date = "2026-01-01"

# KV para guardar as configs dos dashboards criados no wizard.
# Crie com: wrangler kv namespace create DASHBOARDS_KV
# e cole o id abaixo (ou configure o binding no painel Pages > Settings > Bindings).
[[kv_namespaces]]
binding = "DASHBOARDS_KV"
id = "<SEU_KV_NAMESPACE_ID>"

# Cache opcional das respostas de conector (5 min). Mesmo padrão do binding acima.
[[kv_namespaces]]
binding = "DASHBOARD_CACHE"
id = "<SEU_KV_CACHE_ID>"
